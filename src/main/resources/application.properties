server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/eventbooking
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
app.jwt.secret=event-booking-super-secret-key-256-bits-minimum-length-here
app.jwt.expiration=86400000

# Booking config
app.seat.lock.ttl-seconds=600
app.base-url=http://localhost:8081

logging.level.com.eventbooking=INFO
spring.main.allow-circular-references=true
